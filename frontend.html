<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Route Planner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            display: flex;
            height: calc(100vh - 80px);
            gap: 10px;
            padding: 10px;
        }

        .panel {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow-y: auto;
        }

        .control-panel {
            flex: 0 0 250px;
        }

        .visualization-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .editor-panel {
            flex: 0 0 280px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }

        input, button, textarea, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #2980b9;
        }

        button.secondary {
            background: #95a5a6;
        }

        button.secondary:hover {
            background: #7f8c8d;
        }

        #visualization {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        #mapEditor {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            resize: vertical;
            height: 300px;
        }

        .status-box {
            background: #ecf0f1;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .status-label {
            font-weight: bold;
            color: #2c3e50;
        }

        .route-info {
            background: #d5f4e6;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 12px;
            border-left: 4px solid #27ae60;
        }

        .error {
            background: #fadbd8;
            color: #c0392b;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 12px;
            border-left: 4px solid #c0392b;
        }

        .success {
            background: #d5f4e6;
            color: #27ae60;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 12px;
            border-left: 4px solid #27ae60;
        }
        
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .checkbox-container input[type="checkbox"] {
            width: auto;
            margin: 0;
        }
        
        .checkbox-container label {
            margin: 0;
            flex: 1;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }
            .control-panel, .editor-panel {
                flex: 0 0 auto;
            }
            .visualization-panel {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏭 WMS Route Planner</h1>
    </div>

    <div class="container">
        <!-- Control Panel -->
        <div class="panel control-panel">
            <div class="section">
                <div class="section-title">System Status</div>
                <div class="status-box">
                    <div class="status-label">Cache Size:</div>
                    <div id="cacheSize">0</div>
                </div>
                <button onclick="loadStatus()" class="secondary">Refresh Status</button>
            </div>

            <div class="section">
                <div class="section-title">Define Route</div>
                <input type="text" id="nodesList" placeholder="e.g., Entrance,Aisle_A,Packing" />
                <div class="checkbox-container">
                    <input type="checkbox" id="roundTripCheckbox" checked />
                    <label for="roundTripCheckbox">Round Trip</label>
                </div>
                <div class="checkbox-container">
                    <input type="checkbox" id="optimizeCheckbox" checked />
                    <label for="optimizeCheckbox">Optimize Route</label>
                </div>
                <button onclick="computeRoute()">Compute Route</button>
                <div id="routeResult"></div>
            </div>

            <div class="section">
                <div class="section-title">Visualization</div>
                <button onclick="visualizeMap()">Full Map</button>
                <button onclick="visualizeCurrentRoute()" class="secondary">Map with Route</button>
            </div>
        </div>

        <!-- Visualization Panel -->
        <div class="panel visualization-panel">
            <div class="section-title">Warehouse Map</div>
            <iframe id="visualization" style="border: none; width: 100%; height: 100%;"></iframe>
        </div>

        <!-- Map Editor Panel -->
        <div class="panel editor-panel">
            <div class="section">
                <div class="section-title">Map Editor</div>
                <textarea id="mapEditor" placeholder='{"Node1": {"Node2": 5}, ...}'></textarea>
                <button onclick="updateMap()">Update Map</button>
                <button onclick="loadMapFromServer()" class="secondary">Load Current</button>
                <div id="editorMessage"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:5000';
        let currentRoute = null;
        let currentNodes = null;
        let currentRoundTrip = true;
        let currentOptimize = true;

        // Load and display current status
        async function loadStatus() {
            try {
                const response = await fetch(`${API_BASE}/status`);
                if (!response.ok) throw new Error('Failed to load status');
                const data = await response.json();
                document.getElementById('cacheSize').textContent = data.cache_size || '0';
                showMessage('Status loaded', 'success');
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        // Compute route from node list
        async function computeRoute() {
            const nodesInput = document.getElementById('nodesList').value;
            if (!nodesInput.trim()) {
                showMessage('Enter at least one node', 'error');
                return;
            }

            currentNodes = nodesInput.split(',').map(n => n.trim()).filter(n => n);
            currentRoundTrip = document.getElementById('roundTripCheckbox').checked;
            currentOptimize = document.getElementById('optimizeCheckbox').checked;

            if (currentNodes.length === 0) {
                showMessage('Enter at least one node', 'error');
                return;
            }

            try {
                const nodesStr = currentNodes.join(',');
                const urlParams = new URLSearchParams({
                    nodes: nodesStr,
                    round_trip: currentRoundTrip.toString(),
                    optimize: currentOptimize.toString()
                });
                
                const response = await fetch(`${API_BASE}/get_route?${urlParams}`);
                if (!response.ok) throw new Error('Route computation failed');
                const data = await response.json();
                
                currentRoute = data.path;
                const routeType = currentOptimize ? 'Optimized' : 'Sequential';
                const tripType = currentRoundTrip ? 'Round Trip' : 'One Way';
                const routeInfo = `
                    <div class="route-info">
                        <strong>${routeType} ${tripType}:</strong> ${data.path.join(' → ')}<br>
                        <strong>Distance:</strong> ${data.distance.toFixed(2)}
                    </div>
                `;
                document.getElementById('routeResult').innerHTML = routeInfo;
                showMessage('Route computed successfully', 'success');
            } catch (error) {
                document.getElementById('routeResult').innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        // Visualize full map
        function visualizeMap() {
            document.getElementById('visualization').src = `${API_BASE}/visualize`;
        }

        // Visualize map with current route
        function visualizeCurrentRoute() {
            if (!currentNodes || currentNodes.length === 0) {
                showMessage('Compute a route first', 'error');
                return;
            }
            const nodesStr = currentNodes.join(',');
            const urlParams = new URLSearchParams({
                nodes: nodesStr,
                round_trip: currentRoundTrip.toString(),
                optimize: currentOptimize.toString()
            });
            document.getElementById('visualization').src = `${API_BASE}/visualize?${urlParams}`;
        }

        // Load current map from server
        async function loadMapFromServer() {
            try {
                const response = await fetch(`${API_BASE}/status`);
                if (!response.ok) throw new Error('Failed to load map');
                const data = await response.json();
                const mapJson = JSON.stringify(data.map, null, 2);
                document.getElementById('mapEditor').value = mapJson;
                showMessage('Map loaded from server', 'success');
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        // Update map from editor
        async function updateMap() {
            const mapText = document.getElementById('mapEditor').value;
            if (!mapText.trim()) {
                showMessage('Enter map data', 'error');
                return;
            }

            try {
                const graph = JSON.parse(mapText);
                const response = await fetch(`${API_BASE}/modify_map`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ graph })
                });
                if (!response.ok) throw new Error('Failed to update map');
                const data = await response.json();
                showMessage('Map updated & cache cleared', 'success');
                loadStatus();
                visualizeMap();
                // Clear current route since map changed
                currentRoute = null;
                currentNodes = null;
                document.getElementById('routeResult').innerHTML = '';
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        // Show temporary message
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('editorMessage');
            messageDiv.innerHTML = `<div class="${type}">${msg}</div>`;
            setTimeout(() => messageDiv.innerHTML = '', 4000);
        }

        // Initialize on load
        window.onload = () => {
            loadStatus();
            visualizeMap();
            loadMapFromServer();
        };
    </script>
</body>
</html>
